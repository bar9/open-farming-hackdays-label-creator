name: Deploy Production to GitHub Pages

on:
  workflow_run:
    workflows: ["Check & Test"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: |
          wget -q https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz
          echo "f274f22d7ed0382d638759cc00b5b7c011457829e83011052ca191c7879f7a0e  dx-x86_64-unknown-linux-gnu.tar.gz" | sha256sum -c
          tar -xzf dx-x86_64-unknown-linux-gnu.tar.gz
          chmod +x dx
          sudo mv dx /usr/local/bin/

      - name: Install npm dependencies
        run: npm install

      - name: Tailwind CSS Generation
        run: npx @tailwindcss/cli -i input.css -o assets/tailwind.css

      - name: Update base path for production deployment
        run: |
          sed -i 's/base_path = "open-farming-hackdays-label-creator"/base_path = ""/' Dioxus.toml
          echo "Updated Dioxus.toml base_path for production deployment"

      - name: Build with Dioxus (Production - hidebio feature)
        run: dx build --release --features hidebio

      - name: Configure SPA routing for production
        run: |
          PUBLIC_DIR="./target/dx/open-farming-hackdays-label-creator/release/web/public"
          cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR/404.html"
          cp "./public/CNAME" "$PUBLIC_DIR/CNAME"
          rm -f "$PUBLIC_DIR/robots.txt"

      - name: Deploy to Production GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          external_repository: bar9/declarino
          publish_branch: gh-pages
          publish_dir: ./target/dx/open-farming-hackdays-label-creator/release/web/public
          clean: true
